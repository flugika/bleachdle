
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#04040d;display:flex;align-items:center;justify-content:center;min-height:540px;font-family:sans-serif;}
.wrap{display:flex;flex-direction:column;align-items:center;gap:26px;padding:28px 16px;}
.stage{position:relative;width:360px;height:360px;display:flex;align-items:center;justify-content:center;}
#pcanvas{position:absolute;inset:0;pointer-events:none;}

.ring{position:absolute;border-radius:50%;border-style:solid;pointer-events:none;}
.ring-1{width:220px;height:220px;border:1px solid rgba(120,160,255,0.12);animation:orbit 15s linear infinite;}
.ring-2{width:280px;height:280px;border:0.5px solid rgba(180,100,255,0.09);animation:orbit 24s linear infinite reverse;}
.ring-3{width:340px;height:340px;border:0.5px solid rgba(60,210,180,0.06);animation:orbit 35s linear infinite;}
.mdot{position:absolute;border-radius:50%;top:-4px;left:50%;transform:translateX(-50%);}
.md1{width:7px;height:7px;background:#a8c4ff;box-shadow:0 0 12px 4px rgba(140,180,255,0.85);}
.md2{width:6px;height:6px;background:#d084fc;box-shadow:0 0 10px 3px rgba(200,100,255,0.75);}
.md3{width:6px;height:6px;background:#5eecd4;box-shadow:0 0 10px 3px rgba(80,230,200,0.7);}

.pulse{position:absolute;border-radius:50%;border-width:1.5px;border-style:solid;animation:pout 3s ease-out infinite;}
.p1{width:100px;height:100px;border-color:rgba(100,140,255,0.55);animation-delay:0s;}
.p2{width:100px;height:100px;border-color:rgba(170,70,255,0.4);animation-delay:1s;}
.p3{width:100px;height:100px;border-color:rgba(60,210,180,0.35);animation-delay:2s;}

.smoke{position:absolute;border-radius:50%;pointer-events:none;}
.s1{width:110px;height:70px;background:rgba(60,80,210,0.1);filter:blur(18px);animation:smk 4.5s ease-out infinite 0s;}
.s2{width:80px;height:55px;background:rgba(150,50,230,0.09);filter:blur(15px);animation:smk 4.5s ease-out infinite 1.4s;transform:translateX(22px);}
.s3{width:90px;height:48px;background:rgba(40,190,160,0.07);filter:blur(17px);animation:smk 4.5s ease-out infinite 2.8s;transform:translateX(-18px);}

.aura{position:absolute;border-radius:50%;pointer-events:none;}
.a1{width:140px;height:140px;animation:abr 2.2s ease-in-out infinite;}
.a2{width:175px;height:175px;animation:abr 2.2s ease-in-out infinite 0.7s;}

.burst{position:absolute;border-radius:50%;pointer-events:none;animation:bfl 7s ease-in-out infinite;}
.b1{width:190px;height:190px;background:radial-gradient(circle,rgba(100,140,255,0.13) 0%,transparent 70%);animation-delay:0s;}
.b2{width:210px;height:210px;background:radial-gradient(circle,rgba(170,70,255,0.11) 0%,transparent 70%);animation-delay:2.3s;}
.b3{width:170px;height:170px;background:radial-gradient(circle,rgba(50,210,180,0.1) 0%,transparent 70%);animation-delay:4.6s;}

.chain{position:absolute;width:1.5px;pointer-events:none;animation:cflk 5.5s ease-in-out infinite;}
.cv{height:90px;background:linear-gradient(to bottom,transparent,rgba(120,160,255,0.4),transparent);}
.cv2{height:90px;background:linear-gradient(to top,transparent,rgba(190,90,255,0.35),transparent);animation-delay:2.7s;}

.tsuba-wrap{position:relative;z-index:10;}
.tsuba-spin{animation:spin 5s linear infinite;transform-origin:center;display:block;}

.txt-main{font-size:11px;letter-spacing:0.36em;color:rgba(200,169,110,0.92);text-transform:uppercase;animation:tp 2.2s ease-in-out infinite;}
.txt-sub{font-size:9px;letter-spacing:0.22em;color:rgba(140,160,255,0.52);text-transform:uppercase;margin-top:5px;}
.ctrl{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.btn{padding:7px 18px;border:1px solid rgba(200,169,110,0.4);background:transparent;color:rgba(200,169,110,0.8);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;border-radius:6px;transition:all 0.2s;}
.btn:hover,.btn.on{background:rgba(200,169,110,0.12);border-color:rgba(200,169,110,0.85);}
.lbl{font-size:9px;color:rgba(130,150,220,0.55);letter-spacing:0.12em;text-align:center;}

@keyframes orbit{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes pout{0%{transform:scale(0.55);opacity:0.85;}100%{transform:scale(4.2);opacity:0;}}
@keyframes abr{0%,100%{opacity:0.4;transform:scale(1);}50%{opacity:1;transform:scale(1.12);}}
@keyframes smk{0%{transform:translateY(0) scale(0.85);opacity:0.6;}100%{transform:translateY(-70px) scale(2.2);opacity:0;}}
@keyframes cflk{0%,88%,100%{opacity:0;}44%,56%{opacity:0.55;}}
@keyframes bfl{0%,100%{opacity:0;}33%{opacity:1;}}
@keyframes tp{0%,100%{opacity:0.5;}50%{opacity:1;}}
</style>

<script>
const CV = document.getElementById('pcanvas');
const ctx = CV.getContext('2d');
const CX=180, CY=180;

const PAL=[
  [100,145,255],[175,70,255],[55,215,185],[255,155,75],[225,75,155],[90,210,120],[255,200,70]
];

const particles=[];
function mkP(){
  const a=Math.random()*Math.PI*2;
  const r=48+Math.random()*35;
  const c=PAL[Math.floor(Math.random()*PAL.length)];
  return{
    x:CX+Math.cos(a)*r, y:CY+Math.sin(a)*r,
    dx:Math.cos(a)*(0.5+Math.random()*1.3),
    dy:Math.sin(a)*(0.5+Math.random()*1.3),
    life:Math.random(), decay:0.007+Math.random()*0.018,
    size:1.2+Math.random()*2.2, c, trail:[]
  };
}
for(let i=0;i<32;i++) particles.push(mkP());

const bursts=[];
function mkB(){
  const a=Math.random()*Math.PI*2;
  const c=PAL[Math.floor(Math.random()*PAL.length)];
  return{
    x:CX,y:CY,
    dx:Math.cos(a)*(2.5+Math.random()*3.5),
    dy:Math.sin(a)*(2.5+Math.random()*3.5),
    life:1, decay:0.025+Math.random()*0.04,
    size:1.5+Math.random()*3, c
  };
}

// Floating orbs (slow drifting colored glows)
const orbs=[];
for(let i=0;i<5;i++){
  const a=Math.random()*Math.PI*2;
  const r=80+Math.random()*60;
  const c=PAL[Math.floor(Math.random()*PAL.length)];
  orbs.push({
    x:CX+Math.cos(a)*r, y:CY+Math.sin(a)*r,
    vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3,
    size:14+Math.random()*18, c, alpha:0.3+Math.random()*0.4,
    phase:Math.random()*Math.PI*2
  });
}

let lastBurst=0, spd=1, t=0;

function frame(ts){
  ctx.clearRect(0,0,360,360);
  t+=0.016;

  // Orbs
  for(const o of orbs){
    o.x+=o.vx*spd; o.y+=o.vy*spd;
    o.phase+=0.012*spd;
    const a=o.alpha*(0.5+0.5*Math.sin(o.phase));
    const dx=o.x-CX, dy=o.y-CY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>145){o.vx*=-1;o.vy*=-1;}
    const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.size);
    g.addColorStop(0,`rgba(${o.c[0]},${o.c[1]},${o.c[2]},${a})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(o.x,o.y,o.size,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
  }

  // Burst spawn
  if(ts-lastBurst>600+Math.random()*1000){
    for(let i=0;i<10;i++) bursts.push(mkB());
    lastBurst=ts;
  }

  for(let i=bursts.length-1;i>=0;i--){
    const b=bursts[i];
    b.x+=b.dx*spd; b.y+=b.dy*spd;
    b.life-=b.decay*spd;
    if(b.life<=0){bursts.splice(i,1);continue;}
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.size*b.life,0,Math.PI*2);
    ctx.fillStyle=`rgba(${b.c[0]},${b.c[1]},${b.c[2]},${b.life*0.95})`;
    ctx.fill();
    const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.size*3);
    g.addColorStop(0,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},${b.life*0.25})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(b.x,b.y,b.size*3,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
  }

  // Main particles
  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    p.trail.push({x:p.x,y:p.y,l:p.life});
    if(p.trail.length>10) p.trail.shift();
    p.x+=p.dx*spd; p.y+=p.dy*spd;
    p.life-=p.decay*spd;
    for(let j=0;j<p.trail.length;j++){
      const tr=p.trail[j];
      const a=(j/p.trail.length)*tr.l*0.45;
      ctx.beginPath(); ctx.arc(tr.x,tr.y,p.size*(j/p.trail.length)*0.8,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${a})`; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${p.life})`; ctx.fill();
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*4);
    g.addColorStop(0,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${p.life*0.28})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*4,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    if(p.life<=0) particles[i]=mkP();
  }

  // Energy arcs
  if(Math.random()<0.06){
    const a=particles[Math.floor(Math.random()*particles.length)];
    const b=particles[Math.floor(Math.random()*particles.length)];
    if(a&&b&&a!==b){
      ctx.beginPath(); ctx.moveTo(a.x,a.y);
      const mx=(a.x+b.x)/2+(Math.random()-0.5)*40;
      const my=(a.y+b.y)/2+(Math.random()-0.5)*40;
      ctx.quadraticCurveTo(mx,my,b.x,b.y);
      ctx.strokeStyle=`rgba(${a.c[0]},${a.c[1]},${a.c[2]},0.3)`;
      ctx.lineWidth=0.8; ctx.stroke();
    }
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// Aura/glow color cycle
const aura1=document.getElementById('aura1');
const tsuba=document.getElementById('tsuba');
const AURAS=[
  ['rgba(100,145,255,0.22)','rgba(150,70,255,0.09)',
   'drop-shadow(0 0 16px rgba(100,145,255,0.8)) drop-shadow(0 0 42px rgba(150,70,255,0.45))'],
  ['rgba(55,215,185,0.2)','rgba(80,145,255,0.08)',
   'drop-shadow(0 0 16px rgba(55,215,185,0.8)) drop-shadow(0 0 42px rgba(80,200,255,0.45))'],
  ['rgba(225,75,155,0.2)','rgba(100,60,230,0.08)',
   'drop-shadow(0 0 16px rgba(225,75,155,0.8)) drop-shadow(0 0 42px rgba(120,60,240,0.45))'],
  ['rgba(255,155,75,0.18)','rgba(200,80,255,0.07)',
   'drop-shadow(0 0 16px rgba(255,155,75,0.75)) drop-shadow(0 0 42px rgba(200,80,255,0.4))'],
];
let ci=0;
setInterval(()=>{
  ci=(ci+1)%AURAS.length;
  const [c1,c2,glow]=AURAS[ci];
  aura1.style.background=`radial-gradient(circle,${c1} 0%,${c2} 45%,transparent 70%)`;
  tsuba.style.filter=glow;
},2800);
// Set initial glow
tsuba.style.filter=AURAS[0][2];

function setLvl(l,el){
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  const c={low:{s:'9s',m:0.4},medium:{s:'5s',m:1},high:{s:'1.8s',m:2.5}}[l];
  document.querySelector('.tsuba-spin').style.animationDuration=c.s;
  spd=c.m;
}
</script>
